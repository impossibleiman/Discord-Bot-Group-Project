<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Members - Minecraft Society</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
  :root {
      --accent: #22c55e
      --bg: #0f172a
      --card: #1e293b
      --text: #e2e8f0
    }

    body {
      margin: 0;
      background var(--bg);
      colour: var(--text);
      font-family: 'Poppins', sans-serif
    }

    header {
      position: fixed;
      width: 100%
      background: rgba(15,23,42,0.9);
      backdrop-filter: blur(10px);
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
    }

   .logo {
    color: var(--accent);
    font-weight: bold;
}

nav a {
    margin-left: 20px;
    color: white;
    text-decoration: none;
}

.btn {
    background: var(--accent);
    padding: 8px 14px;
    border-radius: 6px;
    color: black !important;
}
    .main {
    padding: 120px 40px;
}


h1 {
    text-align: center;
}


.grid {
    margin-top: 40px;
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    justify-content: center;
}


.card {
    background: var(--card);
    padding: 20px;
    border-radius: 12px;
    width: 220px;
    text-align: center;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-6px);
}


.avatar {
    width: 60px;
    height: 60px;
    background: #334155;
    border-radius: 50%;
    margin: auto;
    margin-bottom: 10px;
}
