<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Members - Minecraft Society</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --accent: #22c55e
      --bg: #0f172a
      --card: #1e293b
      --text: #e2e8f0

    body {
      margin: 0;
      background var(--bg);
      colour: var(--text);

    header {
      position: fixed;
      width: 100%
      background: rgba(15,23,42,0.9);
      backdrop-filter: blur(10px);
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
