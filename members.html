<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Members - Minecraft Society</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
  :root {
      --accent: #22c55e
      --bg: #0f172a
      --card: #1e293b
      --text: #e2e8f0
    }

  body {
    margin: 0;
    background: #0f172a;
    color: #e2e8f0;
    font-family: 'Poppins', sans-serif;
}

/* MAIN */
.main {
    padding: 120px 40px;
    max-width: 1100px;
    margin: auto;
}

/* TITLE */
h1 {
    text-align: center;
    margin-bottom: 40px;
}

/* GRID */
.grid {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    justify-content: center;
}

/* CARD */
.card {
    background: #1e293b;
    padding: 25px;
    border-radius: 12px;
    width: 200px;
    text-align: center;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-6px);
    box-shadow: 0 0 25px rgba(34, 197, 94, 0.15);
}

/* AVATAR */
.avatar {
    width: 70px;
    height: 70px;
    background: #334155;
    border-radius: 50%;
    margin: auto;
    margin-bottom: 15px;
}

    </style>
</head>
